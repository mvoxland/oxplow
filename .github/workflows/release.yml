name: Release

# Tag-triggered release flow. Push a `v<version>` tag (matching
# Cargo.toml's [workspace.package].version) and this workflow builds
# Tauri installers on all three platforms and publishes them to a
# GitHub Release. Also runnable manually from the Actions tab for dry
# runs / re-runs.
#
# Version source of truth: Cargo.toml [workspace.package].version.
# The desktop crate inherits it via `version.workspace = true`, and
# tauri.conf.json omits its own `version` field so Tauri falls back
# to that crate's Cargo.toml. The root package.json and
# apps/desktop/package.json are private workspace shells with no
# version field — nothing to keep in sync.
#
# To create a release:
# 1. Bump Cargo.toml [workspace.package].version = "X.Y.Z"
# 2. cargo check (to refresh Cargo.lock) + commit
# 3. git tag vX.Y.Z && git push origin vX.Y.Z


on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # Tag-vs-Cargo.toml sanity check. Cargo.toml [workspace.package]
  # .version is the single source of truth (tauri.conf.json and both
  # package.json files no longer carry a version). Fails fast if
  # someone pushed a v0.0.2 tag while the workspace version still
  # says 0.0.1. The verify step no-ops on workflow_dispatch runs
  # that weren't fired against a tag ref (manual dry runs from a
  # branch), so the job always reports success and doesn't block
  # downstream jobs.
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches Cargo.toml workspace version
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          # Pull `version = "..."` from [workspace.package]. awk
          # tracks the current TOML section so a `version` line
          # under some other table (e.g. a dependency) can't
          # accidentally win.
          cargo_version=$(awk '
            /^\[/ { section = $0; next }
            section == "[workspace.package]" && /^version[[:space:]]*=/ {
              match($0, /"[^"]*"/);
              print substr($0, RSTART + 1, RLENGTH - 2);
              exit;
            }
          ' Cargo.toml)
          echo "tag: $tag (version=$tag_version)"
          echo "Cargo.toml [workspace.package].version: $cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag $tag does not match Cargo.toml [workspace.package].version $cargo_version"
            exit 1
          fi

  test:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            tmux
      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install JS deps
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # `contents: write` is what tauri-action needs to create the draft
    # release and upload assets via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential
      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Install JS deps
        run: bun install --frozen-lockfile

      # tauri-action runs `tauri build`, then (when tagName is set)
      # creates/updates a draft GitHub Release and uploads the bundles
      # produced for the current platform. The first matrix leg
      # creates the draft; the rest attach to it. Still unsigned —
      # users will see OS "unsigned developer" warnings.
      - name: Build + publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # vite build under bun spawns Node for some plugins and the
          # default 1.5–2 GB heap is tight on macOS runners (observed
          # FATAL: heap out of memory during the bundler pass). 6 GB
          # leaves comfortable headroom on every runner.
          NODE_OPTIONS: "--max-old-space-size=6144"
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false

  # Rewrite the Homebrew Cask in the nvoxland/homebrew-oxplow tap
  # with the just-released version + the SHA256 of the arm64 DMG
  # asset attached to this release's still-draft tag, then commit +
  # push back to the tap repo. Users then get the new version on
  # `brew upgrade --cask oxplow`.
  #
  # Bootstrapping requirements:
  # - A repo at https://github.com/nvoxland/homebrew-oxplow with a
  #   `Casks/oxplow.rb` file (see packaging/homebrew/README.md).
  # - A repo secret `HOMEBREW_TAP_TOKEN` carrying a personal access
  #   token with `repo` scope (covers both this repo's draft-release
  #   asset download and the tap repo push).
  #
  # Sequenced BEFORE finalize on purpose: a cask publish failure
  # here aborts the run, finalize doesn't fire, and the release
  # stays as an invisible draft. Better than a public release whose
  # advertised Homebrew install path is broken.
  publish-cask:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bump cask in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          dmg_name="Oxplow_${version}_aarch64.dmg"

          # The release is still a draft at this point (finalize
          # runs after us). `gh release download` resolves the
          # asset via the API and works against drafts as long as
          # the token has Contents:read on this repo — which a
          # personal-account `repo`-scope PAT does.
          echo "Downloading ${dmg_name} from draft release ${tag}…"
          mkdir -p /tmp/cask
          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --pattern "$dmg_name" \
            --dir /tmp/cask
          sha=$(shasum -a 256 "/tmp/cask/${dmg_name}" | awk '{print $1}')
          echo "sha256: $sha"

          # Render the cask template with concrete version + sha.
          mkdir -p /tmp/tap/Casks
          cp packaging/homebrew/oxplow.rb /tmp/tap-template.rb
          sed -i \
            -e "s/^  version \".*\"/  version \"${version}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${sha}\"/" \
            /tmp/tap-template.rb

          # Clone the tap, replace the cask, commit, push.
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/nvoxland/homebrew-oxplow.git" \
            /tmp/tap
          mkdir -p /tmp/tap/Casks
          mv /tmp/tap-template.rb /tmp/tap/Casks/oxplow.rb
          cd /tmp/tap
          git config user.email "actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/oxplow.rb
          if git diff --cached --quiet; then
            echo "Cask already at ${version}; nothing to commit."
            exit 0
          fi
          git commit -m "oxplow ${version}"
          git push origin HEAD

  # tauri-action leaves the release as a draft without notes. Once
  # everything that *must* succeed before users see the release has
  # succeeded (matrix builds attached, Homebrew tap bumped),
  # generate release notes from commits/PRs since the previous tag
  # and flip the draft to published. Only runs on real tag pushes —
  # workflow_dispatch dry runs from a branch skip this step (there's
  # no release to finalize).
  finalize:
    needs: publish-cask
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # GitHub's auto-generator picks a previous tag automatically
          # and returns a formatted markdown body.
          notes=$(gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$tag" \
            --jq .body)
          printf '%s\n' "$notes" > /tmp/release-notes.md
          gh release edit "$tag" \
            --draft=false \
            --notes-file /tmp/release-notes.md
