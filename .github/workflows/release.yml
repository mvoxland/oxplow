name: Release

# Tag-triggered release flow. Push a `v<version>` tag (matching
# package.json's version field) and this workflow builds Tauri
# installers on all three platforms and publishes them to a GitHub
# Release. Also runnable manually from the Actions tab for dry runs /
# re-runs.
#
# To create a release:
# 1. Tag: git tag vX.Y.Z
# 2. Push tag: git push origin vX.Y.Z
# 3. Bump versions to match the tag you're about to push:
#    - package.json: version = "X.Y.Z"
#    - Cargo.toml: [workspace.package].version = "X.Y.Z"
#    - bun install (to refresh bun.lock) + cargo check (to refresh Cargo.lock)
#    - commit


on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # Tag-vs-package.json-vs-Cargo.toml sanity check. Fails fast if
  # someone pushed a v0.0.2 tag while package.json still says 0.0.1,
  # or while the workspace Cargo.toml's [workspace.package].version
  # is out of sync — avoids cutting a release with a version mismatch
  # baked into installer filenames or Rust artifact metadata. The
  # verify step no-ops on workflow_dispatch runs that weren't fired
  # against a tag ref (manual dry runs from a branch), so the job
  # always reports success and doesn't block downstream jobs.
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package.json + Cargo.toml versions
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          pkg_version=$(node -p "require('./package.json').version")
          # Pull `version = "..."` from [workspace.package]. awk
          # tracks the current TOML section so a `version` line
          # under some other table (e.g. a dependency) can't
          # accidentally win.
          cargo_version=$(awk '
            /^\[/ { section = $0; next }
            section == "[workspace.package]" && /^version[[:space:]]*=/ {
              match($0, /"[^"]*"/);
              print substr($0, RSTART + 1, RLENGTH - 2);
              exit;
            }
          ' Cargo.toml)
          echo "tag: $tag (version=$tag_version)"
          echo "package.json version: $pkg_version"
          echo "Cargo.toml [workspace.package].version: $cargo_version"
          fail=0
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match package.json version $pkg_version"
            fail=1
          fi
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag $tag does not match Cargo.toml [workspace.package].version $cargo_version"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

  test:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            tmux
      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install JS deps
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # `contents: write` is what tauri-action needs to create the draft
    # release and upload assets via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential
      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Install JS deps
        run: bun install --frozen-lockfile

      # tauri-action runs `tauri build`, then (when tagName is set)
      # creates/updates a draft GitHub Release and uploads the bundles
      # produced for the current platform. The first matrix leg
      # creates the draft; the rest attach to it. Still unsigned —
      # users will see OS "unsigned developer" warnings.
      - name: Build + publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # vite build under bun spawns Node for some plugins and the
          # default 1.5–2 GB heap is tight on macOS runners (observed
          # FATAL: heap out of memory during the bundler pass). 6 GB
          # leaves comfortable headroom on every runner.
          NODE_OPTIONS: "--max-old-space-size=6144"
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false

  # tauri-action leaves the release as a draft without notes. After
  # every platform has attached its assets, generate release notes
  # from commits/PRs since the previous tag and flip the draft to
  # published. Only runs on real tag pushes — workflow_dispatch dry
  # runs from a branch skip this step (there's no release to finalize).
  finalize:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # GitHub's auto-generator picks a previous tag automatically
          # and returns a formatted markdown body.
          notes=$(gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$tag" \
            --jq .body)
          printf '%s\n' "$notes" > /tmp/release-notes.md
          gh release edit "$tag" \
            --draft=false \
            --notes-file /tmp/release-notes.md
