name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # webkit2gtk is required by Tauri on Linux; the rest are standard
      # build deps for the Rust→C native deps (libgit2 vendored, etc.).
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            tmux

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Cargo test
        run: cargo test --workspace --all-features

      # Drift guard: if `cargo test` regenerated TS bindings (because a
      # Rust signature changed), the diff fails the PR.
      - name: Verify generated TS bindings are up to date
        run: |
          if [ -n "$(git status --porcelain apps/desktop/src/tauri-bridge/generated)" ]; then
            echo "::error::tauri-specta bindings drifted — re-run cargo test and commit the result"
            git --no-pager diff apps/desktop/src/tauri-bridge/generated
            exit 1
          fi

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            tmux

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Surfaces line/region coverage per crate. Workspace floor is
      # set to 65% lines — current baseline ~70%. The thinnest
      # crates (oxplow-mcp, oxplow-tauri-ipc command adapters) drag
      # the average; the floor lets the average drop a few points
      # before it fails so a single uncovered new file doesn't break
      # CI but a regression sweep does. Raise the floor as crate
      # coverage improves.
      - name: Coverage report (with floor)
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 65

      # Per-crate floors so a regression in one crate (e.g. the IPC
      # command adapters going to 0% again) fails CI even if the
      # workspace average still clears 65%. Floors live in
      # scripts/coverage-floors.py.
      - name: Per-crate coverage floors
        run: cargo llvm-cov report --json | python3 scripts/coverage-floors.py

      - name: LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn
          retention-days: 30

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Tauri build
        run: bun run tauri:build
        env:
          # Unsigned build — no code-signing certs in CI. Tauri's
          # bundler still produces working installers; users will see
          # a "not signed" warning on macOS/Windows.
          CI: "true"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxplow-${{ matrix.os }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app.tar.gz
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 14
