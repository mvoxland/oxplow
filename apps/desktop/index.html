<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>oxplow</title>
    <style>
      /* ============================================================
         Locally-bundled variable fonts. Live under
         apps/desktop/public/fonts/ and served from /fonts/ at runtime.
         Variable axes cover the full weight range so we don't need
         per-weight files. See .context/theming.md "Typography".
         ============================================================ */
      @font-face {
        font-family: "Inter";
        src: url("/fonts/InterVariable.woff2") format("woff2-variations"),
             url("/fonts/InterVariable.woff2") format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("/fonts/InterVariable-Italic.woff2") format("woff2-variations"),
             url("/fonts/InterVariable-Italic.woff2") format("woff2");
        font-weight: 100 900;
        font-style: italic;
        font-display: block;
      }
      @font-face {
        font-family: "JetBrains Mono";
        src: url("/fonts/JetBrainsMonoVariable.woff2") format("woff2-variations"),
             url("/fonts/JetBrainsMonoVariable.woff2") format("woff2");
        font-weight: 100 800;
        font-style: normal;
        font-display: block;
      }
      @font-face {
        font-family: "JetBrains Mono";
        src: url("/fonts/JetBrainsMonoVariable-Italic.woff2") format("woff2-variations"),
             url("/fonts/JetBrainsMonoVariable-Italic.woff2") format("woff2");
        font-weight: 100 800;
        font-style: italic;
        font-display: block;
      }

      /* ============================================================
         Theme tokens. All renderer components read CSS variables.
         Oxplow is dark-only — values live on :root.
         See .context/theming.md.
         ============================================================ */

      :root {
        /* Unified cool blue-grey dark palette. Three surface tiers
           (app < rail/card < elevated) plus a slightly lifted active-tab
           tier. No warm hues anywhere on chrome. */
        --surface-app: #0f1115;
        --surface-card: #161a20;
        --surface-rail: #13161b;
        --surface-tab-active: #1c2027;
        --surface-tab-inactive: transparent;
        --surface-elevated: #20242c;
        --surface-overlay: rgba(0, 0, 0, 0.55);

        --border-subtle: #232831;
        --border-strong: #333944;

        --text-primary: #e8eaef;
        --text-secondary: #9097a3;
        --text-muted: #5f6571;

        --accent: #6b9cf6;
        --accent-hover: #8db2f8;
        --accent-soft-bg: #1c2a48;
        --accent-on-accent: #ffffff;

        --status-running: #5b8cf5;
        --status-waiting: #f59e0b;
        --status-ready: #94a3b8;
        --status-done: #34d399;
        --status-canceled: #6b7280;

        --severity-low: #94a3b8;
        --severity-medium: #f59e0b;
        --severity-high: #fb923c;
        --severity-critical: #fb7185;

        --freshness-fresh: #34d399;
        --freshness-stale: #f59e0b;
        --freshness-very-stale: #fb7185;

        /* Comment-anchored text highlight (amber, like a margin note). */
        --comment-highlight: #d9a441;
        --comment-highlight-bg: rgba(217, 164, 65, 0.18);

        --diff-add-bg: #1f3326;
        --diff-add-fg: #a7f3d0;
        --diff-remove-bg: #3a1f25;
        --diff-remove-fg: #fda4af;

        /* Legacy aliases — now mapped onto the unified semantic tier so
           components that haven't migrated still pick up the cool palette
           instead of the original warm-brown values. */
        --bg: var(--surface-app);
        --bg-1: var(--surface-card);
        --bg-2: var(--surface-tab-active);
        --bg-3: var(--surface-rail);
        --bg-tab-inactive: var(--surface-tab-inactive);
        --bg-detail: var(--surface-elevated);
        --fg: var(--text-primary);
        --muted: var(--text-secondary);
        --border: var(--border-subtle);
        /* --border-strong / --accent: semantic above */
        --priority-urgent: #e06c75;
        --priority-high: #e5a06a;
        --priority-medium: #8d8a85;
        --priority-low: #6b6864;

        /* Primary action button — used for the *one* primary CTA per
           region (+ New stream, + New thread, Save, etc.). Secondary
           buttons stay neutral against --surface-card. */
        --button-primary-bg: var(--accent);
        --button-primary-bg-hover: var(--accent-hover);
        --button-primary-fg: var(--accent-on-accent);
        --button-secondary-bg: transparent;
        --button-secondary-bg-hover: rgba(255, 255, 255, 0.04);
        --button-secondary-fg: var(--text-secondary);
        --button-secondary-fg-hover: var(--text-primary);

        --blame-local-fresh: rgba(229, 160, 106, 0.55);
        --blame-local-recent: rgba(229, 160, 106, 0.40);
        --blame-local-stale: rgba(229, 160, 106, 0.28);
        --blame-local-old: rgba(170, 140, 110, 0.18);
        --blame-local-border: #e5a06a;
        --blame-git-fresh: rgba(96, 165, 250, 0.55);
        --blame-git-recent: rgba(96, 165, 250, 0.40);
        --blame-git-stale: rgba(96, 165, 250, 0.28);
        --blame-git-old: rgba(120, 140, 170, 0.14);
        --blame-git-border: #4a9eff;
        --blame-uncommitted: rgba(70, 70, 70, 0.35);

        /* ------------------------------------------------------------
           Typography tokens. Three faces — UI chrome, long-form prose,
           and code surfaces — plus a shared size/leading/weight scale.
           See .context/theming.md "Typography" for the prose-vs-UI-vs-
           mono split. --mono is kept as a legacy alias for safety.
           ------------------------------------------------------------ */
        --font-ui:    "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        --mono: var(--font-mono);

        --text-xs:   12px;
        --text-sm:   13px;
        --text-base: 14px;
        --text-md:   15px;
        --text-lg:   17px;
        --text-xl:   20px;
        --text-2xl:  24px;
        --text-3xl:  28px;

        --leading-tight: 1.25;
        --leading-snug:  1.4;
        --leading-prose: 1.6;

        --weight-regular: 400;
        --weight-medium:  500;
        --weight-bold:    700;

        color-scheme: dark;
      }

      html, body, #root {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-ui);
        /* 14px base body for the Metabase-grade density tune-up (phase 7).
         * Captions/metadata still drop to 13px; tabular IDs stay at 12px;
         * code/diff regions use the mono stack via Monaco. See
         * .context/theming.md "Density" note. */
        font-size: var(--text-base);
        line-height: var(--leading-snug);
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      /* Tabular numerals — applied to IDs/counters/timestamps that need
       * column-aligned digits. Opt-in via class so prose stays proportional. */
      .oxplow-tabular { font-variant-numeric: tabular-nums; font-size: var(--text-xs); }
      * { box-sizing: border-box; }
      /* Disabled controls — without this, inline-styled buttons look
         identical when disabled (cursor: pointer + same colors), and
         users misread an unavailable action as ready-to-click. */
      button:disabled, input:disabled, select:disabled, textarea:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      @keyframes oxplow-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      /* Indeterminate progress: a slim accent bar slides across the track. */
      @keyframes oxplow-progress-indeterminate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
      /* Thin, unobtrusive scrollbars. */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.18);
        background-clip: padding-box;
        border: 2px solid transparent;
      }
      ::-webkit-scrollbar-corner { background: transparent; }
      .oxplow-rail-scroll { scrollbar-width: none; }
      .oxplow-rail-scroll::-webkit-scrollbar { display: none; }
      /* Gutter markers for uncommitted changes in the editor. */
      .oxplow-gutter-added { box-shadow: inset 3px 0 0 0 #16a34a; }
      .oxplow-gutter-modified { box-shadow: inset 3px 0 0 0 var(--accent); }
      .oxplow-gutter-deleted { box-shadow: inset 3px -2px 0 -1px #dc2626; }
      /* Blame margin: kebab hidden until row is hovered. */
      .oxplow-blame-row-kebab { opacity: 0; transition: opacity 80ms ease; }
      .oxplow-blame-row:hover .oxplow-blame-row-kebab,
      .oxplow-blame-row-kebab:focus { opacity: 1; }
      /* Markdown view: link kebab hidden until link or its kebab is hovered. */
      .oxplow-md-link-kebab { opacity: 0; transition: opacity 80ms ease; }
      .oxplow-md-link:hover .oxplow-md-link-kebab,
      .oxplow-md-link-kebab:focus-within { opacity: 1; }
      /* Prose surface — wiki bodies, task descriptions, effort summaries,
         anywhere MarkdownView renders. Serif body, capped width, comfortable
         rhythm. Sans-serif headings for visual contrast (Wikipedia / Metabase
         pattern). Code surfaces inside prose stay mono. */
      .oxplow-md {
        max-width: 78ch;
        margin: 0 auto;
        font-size: var(--text-md);
        line-height: var(--leading-prose);
        color: var(--text-primary);
      }
      .oxplow-md h1, .oxplow-md h2, .oxplow-md h3,
      .oxplow-md h4, .oxplow-md h5, .oxplow-md h6 {
        font-family: var(--font-ui);
        font-weight: var(--weight-bold);
        line-height: var(--leading-tight);
      }
      .oxplow-md h1 { font-size: var(--text-3xl); margin: 0 0 0.6em; }
      .oxplow-md h2 {
        font-size: var(--text-2xl);
        margin: 1.8em 0 0.5em;
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 0.25em;
      }
      .oxplow-md h3 { font-size: var(--text-xl);  margin: 1.4em 0 0.4em; }
      .oxplow-md h4 { font-size: var(--text-lg);  margin: 1.2em 0 0.35em; }
      .oxplow-md h5 { font-size: var(--text-md);  margin: 1.0em 0 0.3em; }
      .oxplow-md h6 { font-size: var(--text-sm);  margin: 1.0em 0 0.3em; color: var(--text-secondary); }
      .oxplow-md > :first-child { margin-top: 0; }

      .oxplow-md p,
      .oxplow-md ul,
      .oxplow-md ol,
      .oxplow-md blockquote { margin: 0 0 0.9em; }
      .oxplow-md li { margin: 0.15em 0; }
      .oxplow-md li > p { margin: 0 0 0.4em; }
      .oxplow-md ul, .oxplow-md ol { padding-left: 1.5em; }

      .oxplow-md code {
        font-family: var(--font-mono);
        font-size: 0.88em;
        background: var(--surface-card);
        border: 1px solid var(--border-subtle);
        border-radius: 3px;
        padding: 0.05em 0.35em;
      }
      .oxplow-md pre {
        font-family: var(--font-mono);
        font-size: 0.85em;
        line-height: 1.5;
        background: var(--surface-card);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 10px 12px;
        overflow-x: auto;
        margin: 0 0 1em;
      }
      .oxplow-md pre code { background: transparent; border: 0; padding: 0; }
      .oxplow-md blockquote {
        border-left: 3px solid var(--border-subtle);
        padding: 0.1em 0 0.1em 0.9em;
        color: var(--text-secondary);
      }
      .oxplow-md hr { border: 0; border-top: 1px solid var(--border-subtle); margin: 1.6em 0; }

      /* Markdown view: GFM tables. ReactMarkdown + remark-gfm emit
         <table>/<thead>/<tbody>/<tr>/<th>/<td> with no styling otherwise,
         which leaves columns running together visually. */
      .oxplow-md table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 14px 0;
        font-size: 13px;
        border: 1px solid var(--border-strong, #3a4150);
        border-radius: 6px;
        overflow: hidden;
      }
      .oxplow-md thead {
        background: var(--surface-elevated, #232934);
      }
      .oxplow-md thead th {
        border-bottom: 2px solid var(--border-strong, #3a4150);
        font-weight: 600;
        color: var(--text-primary);
      }
      .oxplow-md th, .oxplow-md td {
        padding: 8px 12px;
        vertical-align: top;
        text-align: left;
        border-right: 1px solid var(--border-strong, #3a4150);
        border-bottom: 1px solid var(--border-strong, #3a4150);
      }
      .oxplow-md tr > th:last-child,
      .oxplow-md tr > td:last-child { border-right: none; }
      .oxplow-md tbody tr:last-child > td { border-bottom: none; }
      .oxplow-md tbody tr { background: var(--surface-card, #1f242c); }
      .oxplow-md tbody tr:nth-child(even) { background: var(--surface-app, #161a20); }
      .oxplow-md tbody tr:hover { background: var(--surface-tab-inactive, #2a313a); }

      /* Rich-text editor surface. The .ProseMirror element is what
         Tiptap renders into; we inherit the .oxplow-md prose styles
         and only add the editor-specific affordances (hover tint,
         pencil reveal, placeholder copy, focus outline). */
      .oxplow-rt-field {
        max-width: 78ch;
        margin: 0 auto;
      }
      .oxplow-rt-field:hover { background: var(--surface-card); }
      .oxplow-rt-field:focus-within {
        background: var(--surface-card);
        outline: 1px solid var(--border-strong);
      }
      .oxplow-rt-field:hover .oxplow-rt-pencil,
      .oxplow-rt-field:focus-within .oxplow-rt-pencil { opacity: 0.85 !important; }
      .oxplow-rt-editor.ProseMirror { outline: none; min-height: 1.4em; }
      /* Comment-anchored text — an overlay decoration (NOT a stored
         mark), so it never touches the markdown that round-trips to
         disk. Reused class name across prose + (future) other surfaces. */
      .oxplow-comment-highlight {
        background: var(--comment-highlight-bg);
        border-bottom: 2px solid var(--comment-highlight);
        cursor: pointer;
      }
      /* Approximate (fuzzy-reattached) anchor — the quoted text drifted
         and was re-matched within tolerance, so the highlight may not be
         exact. Dashed underline signals the uncertainty. */
      .oxplow-comment-highlight--approx {
        border-bottom-style: dashed;
      }
      /* Wikilink / file: / dir: / gitcommit: anchors inside the editor
         are click-to-navigate (handled by RichTextField's wrapper),
         so they should advertise themselves as links rather than
         showing the editor's text-insertion cursor. */
      .oxplow-rt-editor a { cursor: pointer; }
      /* Leading content-kind icon on every editor wikilink, keyed
         off the href scheme. Mirrors `WikiLinkSpan` in MarkdownView
         which uses the React `PageKindIcon` for the same purpose;
         we use CSS mask-image with inline Lucide SVGs here because
         Tiptap marks don't support React NodeViews. The mask paints
         in `currentColor` so the icon inherits the surrounding text
         color (and the wikilink underline color). */
      .oxplow-rt-editor a[href]::before {
        content: "";
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 3px;
        vertical-align: -2px;
        background-color: currentColor;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center;
        -webkit-mask-size: 100%;
        mask-repeat: no-repeat;
        mask-position: center;
        mask-size: 100%;
      }
      /* Lucide `FileText`. */
      .oxplow-rt-editor a[href^="file:"]::before {
        -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>');
                mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>');
      }
      /* Lucide `Folder`. */
      .oxplow-rt-editor a[href^="dir:"]::before {
        -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>');
                mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>');
      }
      /* Lucide `GitCommit`. */
      .oxplow-rt-editor a[href^="gitcommit:"]::before {
        -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg>');
                mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg>');
      }
      /* Lucide `ExternalLink`. */
      .oxplow-rt-editor a[href^="http"]::before,
      .oxplow-rt-editor a[href^="mailto:"]::before {
        -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>');
                mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>');
      }
      /* Lucide `BookOpen`: internal-wiki fallback (no scheme prefix
         and not an in-page anchor). */
      .oxplow-rt-editor
        a[href]:not([href^="file:"]):not([href^="dir:"]):not([href^="gitcommit:"]):not([href^="http"]):not([href^="mailto:"]):not([href^="#"])::before
      {
        -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>');
                mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>');
      }
      /* In-page anchor links (#section) stay icon-free. */
      .oxplow-rt-editor a[href^="#"]::before { display: none; }
      .oxplow-rt-editor.ProseMirror p.is-editor-empty:first-child::before {
        content: attr(data-placeholder);
        float: left;
        height: 0;
        color: var(--text-muted);
        pointer-events: none;
      }
      /* Within an editor surface, MarkdownView's centering / max-width
         is already applied by .oxplow-rt-field; cancel the inner one
         so we don't double-cap. */
      .oxplow-rt-editor.oxplow-md { max-width: none; margin: 0; }

      /* Task detail page: section subheadings (Acceptance criteria,
         etc.). Lighter weight than .oxplow-md h3 so the page reads as
         one document rather than a stack of nested forms. */
      .task-section-heading {
        font-family: var(--font-ui);
        font-size: var(--text-sm);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-secondary);
        font-weight: var(--weight-medium);
        margin: 0 0 4px;
        padding: 0 8px;
      }
      .task-title-field::placeholder { color: var(--text-muted); }

      /* Task detail page section heading — matches the wiki prose
         H2: UI font, bold, soft underline against --border-subtle.
         Used for "Activity" (and any future per-section heading on
         the task page) so the page reads as one document, not a
         stack of labeled chrome. */
      .task-activity-heading {
        font-family: var(--font-ui);
        font-size: var(--text-2xl);
        font-weight: var(--weight-bold);
        line-height: var(--leading-tight);
        color: var(--text-primary);
        margin: 0 0 12px;
        padding-bottom: 0.25em;
        border-bottom: 1px solid var(--border-subtle);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
